name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.8.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (markdown supported)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@hk9890'

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Run unit tests
        run: bun run test:unit

      - name: Run integration tests
        run: bun run test:integration

      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in semver format (e.g., 0.8.0)"
            exit 1
          fi

      - name: Check version doesn't exist
        run: |
          if git tag -l "v${{ inputs.version }}" | grep -q "v${{ inputs.version }}"; then
            echo "Error: Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Update package.json version
        run: |
          bun -e "
            const pkg = await Bun.file('package.json').json();
            pkg.version = '${{ inputs.version }}';
            await Bun.write('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add package.json
          if git diff --cached --quiet; then
            echo "Version already at ${{ inputs.version }}, nothing to commit"
          else
            git commit -m "release: v${{ inputs.version }}"
          fi

      - name: Create and push tag
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          printf "v%s\n\n%s" "${{ inputs.version }}" "$RELEASE_NOTES" > /tmp/tag-message.txt
          git tag -a "v${{ inputs.version }}" -F /tmp/tag-message.txt
          git push origin main
          git push origin "v${{ inputs.version }}"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ inputs.release_notes }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release v${{ inputs.version }} completed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- NPM Package: @hk9890/opencode-coder@${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Release: https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
